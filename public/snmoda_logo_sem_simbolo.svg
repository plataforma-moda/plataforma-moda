<svg width="100%" viewBox="0 0 1210 610" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">SNModa / Logo Principal sem símbolo</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Logo SNModa apenas com wordmark centralizado</desc>

  <defs>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D98A"/>
      <stop offset="35%" stop-color="#E5C45A"/>
      <stop offset="65%" stop-color="#BFA46F"/>
      <stop offset="100%" stop-color="#9A7D3A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="#F7F8FA" style="fill:rgb(247, 248, 250);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- WORDMARK centralizado -->
  <text x="600" y="290" text-anchor="middle" font-family="Inter, Arial Black, Arial, sans-serif" font-size="96" font-weight="700" fill="#0F1C2E" style="fill:rgb(15, 28, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;Arial Black&quot;, Arial, sans-serif;font-size:96px;font-weight:700;text-anchor:middle;dominant-baseline:auto">SN<tspan font-weight="500" fill="url(#goldText)" letter-spacing="-1" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, &quot;Arial Black&quot;, Arial, sans-serif;font-size:96px;font-weight:500;text-anchor:middle;dominant-baseline:auto">Moda</tspan></text>

  <!-- linha divisória centralizada -->
  <rect x="390" y="306" width="420" height="1" fill="#D6DADF" opacity="0.7" style="fill:rgb(214, 218, 223);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- subtítulo centralizado -->
  <text x="600" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="500" letter-spacing="2" fill="#1F3A5F" style="fill:rgb(31, 58, 95);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Arial, sans-serif;font-size:18px;font-weight:500;text-anchor:middle;dominant-baseline:auto">SISTEMA NACIONAL DA MODA</text>

  <!-- descrição centralizada -->
  <text x="600" y="362" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0.8" fill="#9AA3AD" style="fill:rgb(154, 163, 173);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Inter, Arial, sans-serif;font-size:14px;font-weight:400;text-anchor:middle;dominant-baseline:auto">Infraestrutura de Dados da Moda</text>

</svg>